version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-db:
    image: redis:7-alpine
    container_name: redis-db
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb-db:
    image: mongo:latest
    container_name: mongodb-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres-db:
        condition: service_healthy

  discovery-service:
    build: ./services/discovery
    container_name: discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      - zipkin

  config-service:
    build: ./services/configuration
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      discovery-service:
        condition: service_healthy

  gateway-service:
    build: ./services/gateway
    container_name: gateway-service
    ports:
      - "8222:8222"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  flights-service:
    build: ./services/flights
    container_name: flights-service
    ports:
      - "8070:8070"
    depends_on:
      postgres-db:
        condition: service_healthy
      config-service:
        condition: service_healthy

  customer-service:
    build: ./services/customer
    container_name: customer-service
    ports:
      - "8090:8090"
    depends_on:
      mongodb-db:
        condition: service_started
      config-service:
        condition: service_healthy

  booking-service:
    build: ./services/booking
    container_name: booking-service
    ports:
      - "8060:8060"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-db:
        condition: service_healthy
      config-service:
        condition: service_healthy

  payment-service:
    build: ./services/payment
    container_name: payment-service
    ports:
      - "8040:8040"
    depends_on:
      postgres-db:
        condition: service_healthy
      config-service:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data:
