server:
  port: 8060

spring:
  application:
    name: booking-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5444/booking
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: validate
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-description: "init"
    baseline-version: 0
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  jackson:
    serialization:
      fail-on-empty-beans: false

application:
  config:
    customer-url: http://localhost:8090/api/v1/customers
    flights-url: http://localhost:8070/api/v1/flights