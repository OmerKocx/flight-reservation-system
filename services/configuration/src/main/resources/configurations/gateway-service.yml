server:
  port: 8222

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
        - id: flights-service
          uri: lb://flights-service
          predicates:
            - Path=/api/v1/flights/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/flight-reservation}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/flight-reservation/protocol/openid-connect/certs}